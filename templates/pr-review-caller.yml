name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    uses: mriechers/pr-watcher/.github/workflows/pr-review-reusable.yml@main
    with:
      pr_number: ${{ inputs.pr_number || '' }}
    secrets:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      PR_WATCHER_APP_ID: ${{ secrets.PR_WATCHER_APP_ID }}
      PR_WATCHER_PRIVATE_KEY: ${{ secrets.PR_WATCHER_PRIVATE_KEY }}
      PR_WATCHER_INSTALLATION_ID: ${{ secrets.PR_WATCHER_INSTALLATION_ID }}
